name: Publish Package

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Bumping @mizuchilabs/lyvo to $VERSION"
          pnpm --filter @mizuchilabs/lyvo exec npm version "$VERSION" --no-git-tag-version

      - name: Build package
        run: pnpm --filter @mizuchilabs/lyvo build

      - name: Publish to npm
        run: pnpm --filter @mizuchilabs/lyvo publish --access public --no-git-checks --provenance
